# M2 · 桌垫区域定义 (坐标系: 桌垫毫米, 左上原点, x向右 y向下)
# ⚠️ 模板值 —— 按实际桌垫打印尺寸与布局在 D1-2 校准
mat_size_mm: [900, 600]
px_per_mm: 1.0          # warp 输出分辨率
camera_rotate: 0        # 竖屏相机填 90/270

aruco:
  dictionary: DICT_4X4_50
  marker_size_mm: 40
  markers:              # id → 桌垫上四角坐标 [左上 右上 右下 左下] (mm)
    0: [[20, 20], [60, 20], [60, 60], [20, 60]]
    1: [[840, 20], [880, 20], [880, 60], [840, 60]]
    2: [[840, 540], [880, 540], [880, 580], [840, 580]]
    3: [[20, 540], [60, 540], [60, 580], [20, 580]]
    4: [[430, 20], [470, 20], [470, 60], [430, 60]]
    5: [[430, 540], [470, 540], [470, 580], [430, 580]]
    6: [[20, 280], [60, 280], [60, 320], [20, 320]]
    7: [[840, 280], [880, 280], [880, 320], [840, 320]]

zones:                  # name → [x, y, w, h] (mm); 牌 63×88, 框留余量
  C1: [285, 255, 70, 95]
  C2: [360, 255, 70, 95]
  C3: [435, 255, 70, 95]
  C4: [510, 255, 70, 95]
  C5: [585, 255, 70, 95]
  P1a: [120, 430, 70, 95]
  P1b: [195, 430, 70, 95]
  P2a: [360, 430, 70, 95]
  P2b: [435, 430, 70, 95]
  P3a: [600, 430, 70, 95]
  P3b: [675, 430, 70, 95]
  P4a: [360, 80, 70, 95]
  P4b: [435, 80, 70, 95]
  MUCK: [120, 80, 100, 95]
  DECK: [700, 80, 100, 95]   # 荷官手边牌堆区

# 三态判定参数 (现场光线下 D2-3 微调)
back_hsv: {low: [100, 60, 40], high: [130, 255, 255]}   # 蓝背牌; 红背改 [170,60,40]~[180,...]
back_ratio_threshold: 0.35
white_ratio_threshold: 0.40
